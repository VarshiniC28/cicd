# TRIGGERS :
# Types of triggers :
# 1. Event based trigger : when a specific event happens in the repository, workflow will be triggered. Ex: push, pull request, release, etc
# 2. Schedule based trigger : workflow will be triggered at a specific time or interval. Ex: every day at 12 PM, every Monday, etc
# 3. Manual trigger : workflow will be triggered manually by a user. Ex: using workflow_dispatch event
# 4. Workflow trigger : one workflow can trigger another workflow using workflow_run event 

