# to trigger workflow based on branches
name : Hello
on : 
  push:
    branches : 
      - main
      - dev 
  pull_request:
    branches :
      - main
jobs :
  build:
    runs-on: ubuntu-latest
    steps:
      - name: build step
        run: echo " build step running" 