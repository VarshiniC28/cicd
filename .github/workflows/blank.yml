  # now to make jobs run sequentially, i.e only after build, test job should run and then test
  #  use needs as below
  
name : Hello #name of workflow
on : workflow_dispatch #this says that workflow runs on manual trigger
jobs : #jobs that workflow should do when triggered
  build: # mandatorily needs the runs-on field
    runs-on: ubuntu-latest
    steps:
      - name: Build step
        run : echo "A demo build"
  #2nd job is to test
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
        - name: Test Phase
          run : echo "Running test cases"
  #3rd job is 
  deploy :
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy the app
        run: echo "deploying the app"
