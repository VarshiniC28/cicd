#Git hub actions: Action in git hub is a reusable application or set of code performs the specific task within the workflow
# Checkout action

name: Git hub action
on: push 
jobs:
   action-demo :
     runs-on: ubuntu-latest
     steps:
       - name: Checkout the action
         uses: actions/checkout@v4  #uses keyword is used for using action in the workflow
       - name: Print index.html file
         run: cat index.html


