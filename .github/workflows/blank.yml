# variables in github actions :
# variables are used to store values that can be used in workflows and jobs. There are two types of variables in github actions :
# 1. Environment variables : these are predefined variables that are available in all workflows and jobs. Ex: GITHUB_REPOSITORY, GITHUB_REF, GITHUB_SHA, etc
# 2. Custom variables : these are user defined variables that can be used in workflows and jobs. Ex: MY_VARIABLE, etc

# variables holds peice of information and are used to store non sensitive data. For sensitive data we use secrets in github actions.

